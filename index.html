<!DOCTYPE html>
<html>
<head>
    <title>Jailbreak Robux Shop</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
            color: white;
            text-align: center;
        }

        h1 {
            padding: 20px;
        }

        .container {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: #1c1c1c;
            width: 220px;
            padding: 15px;
            border-radius: 12px;
            transition: 0.3s;
            box-shadow: 0 0 15px rgba(0,255,255,0.2);
        }

        .card:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(0,255,255,0.6);
        }

        .hyperchrome {
            box-shadow: 0 0 20px orange;
        }

        .price {
            font-weight: bold;
            font-size: 18px;
            color: #00ffcc;
        }

        button {
            margin-top: 10px;
            padding: 8px;
            border: none;
            border-radius: 6px;
            background: #00ffcc;
            cursor: pointer;
            color: black;
            font-weight: bold;
        }

        button:hover {
            background: #00ffaa;
        }
    </style>
</head>
<body>

<h1>💎 Jailbreak Robux Shop 💎</h1>

<div class="container">

    <div class="card hyperchrome">
        <h2>🟠 Hyperchrome Orange</h2>
        <p>Special Vehicle Skin</p>
        <p class="price">100 Robux</p>
        <button onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=jorgealt606@gmail.com&su=Buying%20Hyperchrome%20Orange', '_blank')">Buy</button>
    </div>

    <div class="card">
        <h2>Bugatti</h2>
        <p>Top Speed: 310 MPH</p>
        <p class="price">2,500 Robux</p>
        <button onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=jorgealt606@gmail.com&su=Buying%20Bugatti', '_blank')">Buy</button>
    </div>

    <div class="card">
        <h2>🚗 Torpedo</h2>
        <p>Extremely Rare Vehicle</p>
        <p class="price">5,000 Robux</p>
        <button onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=jorgealt606@gmail.com&su=Buying%20Torpedo', '_blank')">Buy</button>
    </div>

    <div class="card">
        <h2>🛠 Services</h2>
        <p>VIP Assistance & Special Access</p>
        <p class="price">1,500 Robux</p>
        <button onclick="window.open('https://mail.google.com/mail/?view=cm&fs=1&to=jorgealt606@gmail.com&su=Buying%20Services', '_blank')">Activate</button>
    </div>

</div>

</body>
</html>
